<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!--font awesome link-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />
<!--google fonts link-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
  rel="stylesheet">
</head>
<body>
    <h1>
    cross : <i class="fa-solid fa-xmark" style="color: red;"></i>
    Check :<i class="fa-solid fa-check" style="color: #74C0FC;"></i>
    truck: <i class="fa-solid fa-truck-fast" style="color: #FFD43B;"></i>
    hart:<i class="fa-solid fa-heart"></i>
    secure:<i class="fa-solid fa-shield" style="color: green;" ></i>
    billing:<i class="fa-solid fa-money-bill-wave"></i>
    billing 2:<i class="fa-solid fa-money-bills"></i>
    Edit:<i class="fa-solid fa-pen-to-square"></i>
    delete:<i class="fa-solid fa-trash" style="color: red;"></i>
    Add :<i class="fa-solid fa-plus" style="color: #74C0FC;"></i>
    active :<i class="fa-solid fa-square-check" style="color: #FFD43B;"></i>
    product :<i class="fa-solid fa-box-open" style="color: #FFD43B;"></i>
    coupon :<i class="fa-solid fa-ticket"></i>
    RS :<i class="fa-solid fa-indian-rupee-sign"></i>
    star:<i class="fa-solid fa-star" style="color: #FFD43B;"></i>
    hand:<i class='fa-solid fa-hands' style='color: #FFD43B;'></i> 
    smile:<i class="fa-regular fa-face-smile" style="color: #FFD43B;"></i>
    guest :<i class="fa-solid fa-user-secret"></i>
    check box:<i class="fa-solid fa-square-check" style="color: #4adbb0;"></i>
    chatbot :<i class="fa-solid fa-headset"></i>
    </h1>

    <!-- Box with X -->
<i class="fa-solid fa-box-xmark" aria-hidden="true"></i>
<span class="sr-only">Out of stock</span>

<!-- Simple ban / no entry -->
<i class="fa-solid fa-ban" aria-hidden="true"></i>

<!-- Circle with X -->
<i class="fa-solid fa-times-circle" aria-hidden="true"></i>

<!-- Warning triangle -->
  <i class="fa-solid fa-triangle-exclamation" style='color: #FFD43B;' aria-hidden="true"></i>

</body>
</html>
